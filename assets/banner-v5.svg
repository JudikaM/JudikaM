    <text class="col" style="animation-duration:6.1s;animation-delay:0.4s" x="852" y="40"><tspan x="852" dy="0" fill-opacity="0.1">0</tspan><tspan x="852" dy="18" fill-opacity="0.2">0</tspan><tspan x="852" dy="18" fill-opacity="0.3">0</tspan><tspan x="852" dy="18" fill-opacity="0.39">0</tspan><tspan x="852" dy="18" fill-opacity="0.49">0</tspan><tspan x="852" dy="18" fill-opacity="0.59">1</tspan><tspan x="852" dy="18" fill-opacity="0.68">0</tspan><tspan x="852" dy="18" fill-opacity="0.78">0</tspan><tspan x="852" dy="18" fill="#e9d5ff" fill-opacity="1">0</tspan></text>
